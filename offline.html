<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — Era Executive Search Inc.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;color:#fff;font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
    .era{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:600;background:linear-gradient(135deg,#DFBD69,#926F34);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .sub{font-size:0.52rem;letter-spacing:0.24em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:48px}
    .line{width:48px;height:1px;background:linear-gradient(to right,#DFBD69,#926F34);margin:0 auto 40px}
    h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;margin-bottom:14px}
    p{font-size:0.84rem;font-weight:300;line-height:1.8;color:rgba(255,255,255,0.5);max-width:320px;margin:0 auto 36px}
    button{padding:14px 36px;background:linear-gradient(135deg,#DFBD69,#926F34);color:#000;border:none;font-family:'Montserrat',sans-serif;font-size:0.64rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer}
  </style>
</head>
<body>
  <div class="era">Era</div>
  <div class="sub">Executive Search Inc.</div>
  <div class="line"></div>
  <div style="font-size:2.5rem;margin-bottom:20px">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
